<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d6d3d1"/>
    </linearGradient>
    <linearGradient id="jar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <g transform="translate(400, 300)">
    <rect x="-90" y="-110" width="180" height="200" rx="20" fill="url(#jar)" filter="url(#shadow)"/>
    <rect x="-100" y="-130" width="200" height="30" rx="6" fill="#059669"/>
    <rect x="-70" y="-60" width="140" height="100" rx="8" fill="#ffffff" stroke="#e7e5e4" stroke-width="2"/>
    <text x="0" y="-20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1c1917">YOGURT</text>
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#78716c">GRIEGO</text>
    <text x="0" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a8a29e">Artesanal · Tenerife</text>
    <circle cx="0" cy="60" r="8" fill="#10b981" opacity="0.3"/>
  </g>
  <text x="400" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#a8a29e">Reemplaza este archivo con tu foto real: /public/yogurt-product.jpg</text>
</svg>
